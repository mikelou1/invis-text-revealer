<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="wrap">
    <label class="row">
      <input type="radio" name="mode" value="off">

      <span>Highlight Mode</span>
    </label>
  </div>
  <script src="popup.js"></script>
</body>
</html>
